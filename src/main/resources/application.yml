server:
  port: 8765

yocoderapi:

  security:
    api-key: ${env.API_KEY}
    api-header: X-YoCoder-Key

  active-provider: gemini

  claude:
    api-key: ${env.CLAUDE_KEY}
    model: claude-haiku-4-5-20251001
    max-tokens: 8192
    api-url: https://api.anthropic.com/v1/messages

  openai:
    api-key: ${env.OPENAI_KEY}
    model: gpt-4o-mini
    max-tokens: 8192
    api-url: https://api.openai.com/v1/chat/completions

  gemini:
    api-key: ${env.GEMINI_KEY}
    model: gemini-2.5-flash-lite
    max-tokens: 8192
    api-url: https://generativelanguage.googleapis.com/v1beta/models/${yocoderapi.gemini.model}:streamGenerateContent

  project:
    # Max file size to include in context (bytes). Files larger than this are summarized only.
    max-file-size-bytes: 50000
    # Max total context size across all files (chars). If exceeded, least-relevant files are dropped.
    max-context-chars: 150000
    # File extensions to include in project context scan
    included-extensions: .java,.php,.js,.ts,.vue,.py,.go,.cs,.cpp,.c,.h,.kt,.rb,.swift,.rs,.jsx,.tsx,.html,.css,.scss,.sql,.xml,.yaml,.yml,.json,.gradle,.properties
    # Directories to always skip
    excluded-dirs: .git,node_modules,target,build,dist,.idea,.vscode,__pycache__,.gradle,vendor,out,bin,.mvn

logging:
  level:
    dev.dreiling: DEBUG
